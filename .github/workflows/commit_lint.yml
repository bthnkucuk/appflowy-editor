name: Commit messages lint
on: [pull_request, push]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        continue-on-error: true
        with:
          failOnErrors: false
          commitDepth: 1
