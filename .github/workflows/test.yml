name: AppFlowyEditor test

on:
  push:
    branches:
      - "main"
      - "stable"
      - "feat/**"

  pull_request:
    branches:
      - "main"
      - "stable"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Flutter info
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze .

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example/lib example/test

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          fail_ci_if_error: false
          verbose: true
          os: ${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}

  example_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
            build_command: flutter build apk --debug
          # TODO(roadmap H1.4): iOS build disabled — example/ios deployment
          # target is 13.0 but device_info_plus 12.4.0 uses iOS 17+ selectors
          # (isiOSAppOnVision) without @available guards. Re-enable after
          # bumping IPHONEOS_DEPLOYMENT_TARGET in example/ios/Podfile +
          # Runner.xcodeproj.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Install package deps
        run: flutter pub get

      - name: Install example deps
        working-directory: example
        run: flutter pub get

      - name: Build ${{ matrix.target }}
        working-directory: example
        run: ${{ matrix.build_command }}
